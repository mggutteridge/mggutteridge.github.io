name: Update World Cup card data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python .github/workflows/update_cards.py

      - name: Commit updated cards.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add cards.json
          git commit -m "Update cards data" || echo "No changes"
          git push
